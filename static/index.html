<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 Run Crab Run</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">🦀 Run Crab Run</a>
        <div class="nav-links">
            <a href="/" onclick="showDashboard(); return false;">Dashboard</a>
            <a href="/jobs" onclick="showJobs(); return false;">Jobs</a>
            <a href="/runs" onclick="showRuns(); return false;">Runs</a>
            <a href="/create" onclick="showCreateJob(); return false;">+ New Job</a>
        </div>
    </nav>
    <main class="container" id="app">
        <div class="dashboard">
            <h1>🦀 Loading...</h1>
        </div>
    </main>
    <script>
const API = '/api';
let activeView = 'dashboard';

async function api(path, opts = {}) {
    const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
    });
    if (!res.ok && res.status !== 204) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
    }
    if (res.status === 204) return null;
    return res.json();
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function statusBadge(status) {
    return `<span class="status-badge status-${status}">${status}</span>`;
}

function duration(ms) {
    if (ms == null) return '—';
    if (ms < 1000) return ms + 'ms';
    if (ms < 60000) return (ms/1000).toFixed(1) + 's';
    return (ms/60000).toFixed(1) + 'm';
}

function shortId(id) {
    return id ? id.substring(0, 8) : '—';
}

function timeAgo(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return d.toLocaleDateString();
}

async function showDashboard() {
    activeView = 'dashboard';
    const app = document.getElementById('app');
    app.innerHTML = '<div class="dashboard"><h1>🦀 Dashboard</h1><p>Loading...</p></div>';

    try {
        const [jobs, runs] = await Promise.all([
            api('/jobs'),
            api('/runs?limit=20'),
        ]);

        const running = (runs || []).filter(r => r.status === 'running').length;
        const failed = (runs || []).filter(r => r.status === 'failed').length;
        const success = (runs || []).filter(r => r.status === 'success').length;

        app.innerHTML = `
            <div class="dashboard">
                <h1>🦀 Dashboard</h1>
                <div class="stats-grid">
                    <div class="stat-card"><h3>Jobs</h3><p class="stat-value">${(jobs||[]).length}</p></div>
                    <div class="stat-card"><h3>Running</h3><p class="stat-value">${running}</p></div>
                    <div class="stat-card"><h3>Success</h3><p class="stat-value stat-success">${success}</p></div>
                    <div class="stat-card"><h3>Failed</h3><p class="stat-value stat-failed">${failed}</p></div>
                </div>
                <section class="dashboard-section">
                    <h2>Jobs</h2>
                    <div class="job-grid">
                        ${(jobs||[]).map(j => `
                            <div class="job-card">
                                <div class="job-card-header">
                                    <h3 class="job-card-name">${escapeHtml(j.name)}</h3>
                                    <span class="enabled-badge ${j.enabled ? 'enabled' : 'disabled'}">${j.enabled ? 'Enabled' : 'Disabled'}</span>
                                </div>
                                <code class="job-card-command">${escapeHtml(j.command)}</code>
                                <p class="job-card-schedule">Schedule: ${j.schedule ? escapeHtml(j.schedule) : 'Manual/Webhook'}</p>
                                <div class="job-card-actions">
                                    <button class="btn btn-sm btn-primary" onclick="triggerJob('${j.id}')">▶ Run</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
                <section class="dashboard-section">
                    <h2>Recent Runs</h2>
                    ${runsTable(runs || [])}
                </section>
            </div>
        `;
    } catch (e) {
        app.innerHTML = `<div class="dashboard"><h1>Error</h1><p>${escapeHtml(e.message)}</p></div>`;
    }
}

function runsTable(runs) {
    if (runs.length === 0) return '<p class="empty">No runs yet.</p>';
    return `<table class="runs-table">
        <thead><tr><th>ID</th><th>Job</th><th>Status</th><th>Trigger</th><th>Duration</th><th>Started</th></tr></thead>
        <tbody>${runs.map(r => `
            <tr>
                <td><a href="#" onclick="showRunDetail('${r.id}'); return false;">${shortId(r.id)}</a></td>
                <td>${escapeHtml(r.job_name)}</td>
                <td>${statusBadge(r.status)}</td>
                <td>${escapeHtml(r.trigger)}</td>
                <td>${duration(r.duration_ms)}</td>
                <td>${timeAgo(r.started_at)}</td>
            </tr>
        `).join('')}</tbody>
    </table>`;
}

async function showJobs() {
    activeView = 'jobs';
    const app = document.getElementById('app');
    app.innerHTML = '<div class="page"><h1>Jobs</h1><p>Loading...</p></div>';

    try {
        const jobs = await api('/jobs');
        app.innerHTML = `
            <div class="page">
                <div class="page-header">
                    <h1>Jobs</h1>
                    <a href="#" onclick="showCreateJob(); return false;" class="btn btn-primary">+ New Job</a>
                </div>
                ${jobs.length === 0 ? '<p class="empty">No jobs yet.</p>' : `
                <table class="jobs-table">
                    <thead><tr><th>Name</th><th>Command</th><th>Schedule</th><th>Status</th><th>Tags</th><th>Actions</th></tr></thead>
                    <tbody>${jobs.map(j => `
                        <tr>
                            <td>${escapeHtml(j.name)}</td>
                            <td><code>${escapeHtml(j.command)}</code></td>
                            <td>${j.schedule ? escapeHtml(j.schedule) : 'Manual'}</td>
                            <td><span class="enabled-badge ${j.enabled ? 'enabled' : 'disabled'}">${j.enabled ? 'On' : 'Off'}</span></td>
                            <td>${(j.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join(' ')}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="triggerJob('${j.id}')">▶ Run</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteJob('${j.id}', '${escapeHtml(j.name)}')">✕</button>
                            </td>
                        </tr>
                    `).join('')}</tbody>
                </table>`}
            </div>
        `;
    } catch (e) {
        app.innerHTML = `<div class="page"><h1>Error</h1><p>${escapeHtml(e.message)}</p></div>`;
    }
}

async function showRuns() {
    activeView = 'runs';
    const app = document.getElementById('app');
    app.innerHTML = '<div class="page"><h1>Runs</h1><p>Loading...</p></div>';

    try {
        const runs = await api('/runs?limit=100');
        app.innerHTML = `
            <div class="page">
                <div class="page-header"><h1>Runs</h1></div>
                ${runsTable(runs || [])}
            </div>
        `;
    } catch (e) {
        app.innerHTML = `<div class="page"><h1>Error</h1><p>${escapeHtml(e.message)}</p></div>`;
    }
}

async function showRunDetail(id) {
    activeView = 'run-detail';
    const app = document.getElementById('app');
    app.innerHTML = '<div class="page"><h1>Run Detail</h1><p>Loading...</p></div>';

    try {
        const run = await api(`/runs/${id}`);
        app.innerHTML = `
            <div class="page">
                <div class="page-header">
                    <h1>Run: ${shortId(run.id)}</h1>
                    ${statusBadge(run.status)}
                </div>
                <div class="detail-grid">
                    <div class="detail-item"><label>Job</label><span>${escapeHtml(run.job_id)}</span></div>
                    <div class="detail-item"><label>Trigger</label><span>${escapeHtml(run.trigger)}</span></div>
                    <div class="detail-item"><label>Exit Code</label><span>${run.exit_code ?? '—'}</span></div>
                    <div class="detail-item"><label>Duration</label><span>${duration(run.duration_ms)}</span></div>
                    <div class="detail-item"><label>CPU Peak</label><span>${run.cpu_pct != null ? run.cpu_pct.toFixed(1) + '%' : '—'}</span></div>
                    <div class="detail-item"><label>Memory Peak</label><span>${run.mem_kb != null ? (run.mem_kb / 1024).toFixed(1) + ' MB' : '—'}</span></div>
                    <div class="detail-item"><label>Started</label><span>${run.started_at}</span></div>
                    <div class="detail-item"><label>Finished</label><span>${run.finished_at ?? '—'}</span></div>
                    ${run.error_message ? `<div class="detail-item detail-error"><label>Error</label><span>${escapeHtml(run.error_message)}</span></div>` : ''}
                </div>
                ${run.stdout ? `
                    <div class="output-section">
                        <h3>Stdout</h3>
                        <pre class="output-box">${escapeHtml(run.stdout)}</pre>
                    </div>
                ` : ''}
                ${run.stderr ? `
                    <div class="output-section">
                        <h3>Stderr</h3>
                        <pre class="output-box output-stderr">${escapeHtml(run.stderr)}</pre>
                    </div>
                ` : ''}
                <div class="page-actions">
                    <a href="#" onclick="showRuns(); return false;" class="btn">← Back to Runs</a>
                </div>
            </div>
        `;
    } catch (e) {
        app.innerHTML = `<div class="page"><h1>Error</h1><p>${escapeHtml(e.message)}</p></div>`;
    }
}

function showCreateJob() {
    activeView = 'create-job';
    const app = document.getElementById('app');
    app.innerHTML = `
        <div class="page">
            <h1>Create Job</h1>
            <form id="job-form" class="job-form" onsubmit="createJob(event)">
                <label>Name
                    <input type="text" id="jf-name" placeholder="e.g., typecheck" required>
                </label>
                <label>Command
                    <input type="text" id="jf-command" placeholder="e.g., cargo check" required>
                </label>
                <label>Schedule (RRULE)
                    <input type="text" id="jf-schedule" placeholder="e.g., FREQ=DAILY;BYHOUR=9 (leave empty for manual)">
                </label>
                <label>Timeout (seconds)
                    <input type="number" id="jf-timeout" placeholder="e.g., 300">
                </label>
                <label>Tags (comma separated)
                    <input type="text" id="jf-tags" placeholder="e.g., ci, rust">
                </label>
                <label>Notify on
                    <select id="jf-notify-on">
                        <option value="never">Never</option>
                        <option value="failure">Failure only</option>
                        <option value="always">Always</option>
                    </select>
                </label>
                <label>Notify email
                    <input type="email" id="jf-notify-email" placeholder="dev@example.com">
                </label>
                <button type="submit" class="btn btn-primary">Create Job</button>
                <div id="jf-message"></div>
            </form>
        </div>
    `;
}

async function createJob(ev) {
    ev.preventDefault();
    const msg = document.getElementById('jf-message');
    const job = {
        name: document.getElementById('jf-name').value,
        command: document.getElementById('jf-command').value,
        schedule: document.getElementById('jf-schedule').value || null,
        timeout_secs: parseInt(document.getElementById('jf-timeout').value) || null,
        tags: document.getElementById('jf-tags').value
            ? document.getElementById('jf-tags').value.split(',').map(s => s.trim()).filter(Boolean)
            : null,
        notify_on: document.getElementById('jf-notify-on').value || null,
        notify_email: document.getElementById('jf-notify-email').value || null,
    };
    try {
        await api('/jobs', { method: 'POST', body: JSON.stringify(job) });
        msg.innerHTML = '<p style="color:var(--success)">Job created!</p>';
        setTimeout(() => showJobs(), 500);
    } catch (e) {
        msg.innerHTML = `<p style="color:var(--danger)">${escapeHtml(e.message)}</p>`;
    }
}

async function triggerJob(id) {
    try {
        await api(`/jobs/${id}/trigger`, { method: 'POST' });
        alert('Job triggered!');
        if (activeView === 'dashboard') showDashboard();
        else if (activeView === 'jobs') showJobs();
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

async function deleteJob(id, name) {
    if (!confirm(`Delete job "${name}"?`)) return;
    try {
        await api(`/jobs/${id}`, { method: 'DELETE' });
        showJobs();
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

// Auto-refresh
setInterval(() => {
    if (activeView === 'dashboard') showDashboard();
    else if (activeView === 'runs') showRuns();
}, 30000);

// Start
showDashboard();
    </script>
</body>
</html>
