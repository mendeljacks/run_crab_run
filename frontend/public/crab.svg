<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 10 360 380" width="100%" height="100%">
    <!-- Legs -->
    <g stroke="#DA291C" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 140 260 L 100 290 L 85 310" />
        
        <path d="M 260 260 L 300 290 L 315 310" />
    </g>

    <!-- Arms -->
    <g stroke="#CC2216" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 120 230 Q 70 220 80 175" /> 
        <path d="M 280 230 Q 330 220 320 175" />
    </g>

    <!-- Left claw (pacman, pinch on top) -->
    <path d="M 55 130 A 30 30 0 1 1 55 170 L 75 150 Z" fill="#DA291C" transform="rotate(70, 55, 150)"/>

    <!-- Right claw (pacman, pinch on top) -->
    <path d="M 345 170 A 30 30 0 1 1 345 130 L 325 150 Z" fill="#DA291C" transform="rotate(-70, 345, 150)"/>

    <!-- Body -->
    <ellipse cx="200" cy="225" rx="110" ry="75" fill="#DA291C"/>

    <!-- Eyes -->
    <g>
        <circle cx="155" cy="152" r="34" fill="#DA291C"/>
        <circle cx="155" cy="152" r="28" fill="#FFFFFF"/>
        <circle cx="159" cy="152" r="18" fill="#1A1A1A"/>

        <circle cx="245" cy="152" r="34" fill="#DA291C"/>
        <circle cx="245" cy="152" r="28" fill="#FFFFFF"/>
        <circle cx="241" cy="152" r="18" fill="#1A1A1A"/>
    </g>

    <!-- Mouth -->
    <path d="M 160 220 C 160 270 240 270 240 220 Z" fill="#1A1A1A"/>
</svg>